services:
  - type: web
    name: ai-prd-generator
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: BOT_DISPLAY_NAME
        value: AI Notetaker
      - key: AUTH_STATE_PATH
        value: /etc/secrets/auth-state.json
      - key: DATABASE_URL
        fromDatabase:
          name: ai-prd-generator-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SLACK_INVITE_URL
        sync: false
      - key: SLACK_SLASH_COMMAND_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: LINEAR_API_KEY
        sync: false
      - key: LINEAR_TEAM_ID
        sync: false
      - key: LINEAR_PROJECT_ID
        sync: false
      - key: LINEAR_ASSIGNEE_ID
        sync: false
      - key: LINEAR_LABEL_IDS
        sync: false
      - key: LINEAR_DONE_STATE_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_ISSUE_LABELS
        sync: false
      - key: CODING_AGENT_ENABLED
        value: "false"
      - key: CODING_AGENT_BASE_BRANCH
        value: master
      - key: CODING_AGENT_WORKDIR
        value: /tmp/ai-prd-coding-agent
      - key: CODING_AGENT_COMMAND
        value: codex exec --model gpt-4o-mini --full-auto --skip-git-repo-check {prompt}

databases:
  - name: ai-prd-generator-db
    plan: starter
