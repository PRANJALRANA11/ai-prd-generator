services:
  - type: web
    name: ai-prd-generator
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_DISPLAY_NAME
        value: AI Notetaker
      - key: DATABASE_URL
        fromDatabase:
          name: ai-prd-generator-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_SLASH_COMMAND_TOKEN
        sync: false
      - key: AUTH_STATE_JSON_BASE64
        sync: false

databases:
  - name: ai-prd-generator-db
    plan: starter
